# Example configuration for cc-agent-messenger.
#
# `cc-agent-messenger init` copies this to .cc-agent-messenger/config.toml.
# Fill in real values. Do NOT commit real tokens (NN8) — .cc-agent-messenger/ is
# gitignored. Any key can also be overridden by an uppercase env var
# (e.g. SLACK_BOT_TOKEN). The config path env var is CC_AGENT_MESSENGER_CONFIG.

# --- Slack credentials (daemon-only; never leave the daemon) ---
slack_bot_token = "xoxb-REPLACE-ME"          # Bot User OAuth token
slack_app_token = "xapp-REPLACE-ME"          # App-level token, scope connections:write

# --- Identity / channel allowlist (NN4) ---
owner_slack_user_id = "U0REPLACEME"          # only this user may drive the agent
allowed_slack_channel_id = "C0REPLACEME"     # the designated private channel

# --- Local paths (host-specific; keep short — AF_UNIX path length limit) ---
profile_path = ".cc-agent-messenger/profile.json"
audit_log_dir = ".cc-agent-messenger/audit"
kill_switch_path = ".cc-agent-messenger/KILL_SWITCH"
send_api_endpoint = ".cc-agent-messenger/send.sock"
inbound_event_path = "tmp/.slack_message"

# --- Behavior ---
default_agent = "claude"
interpretation_mode = "flexible"             # "flexible" | "strict"
max_chunk_chars = 3900
audit_retention_days = 30
