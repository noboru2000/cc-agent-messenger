# Example configuration for cc-agent-messenger.
#
# `cc-agent-messenger init` copies this to .cc-agent-messenger/config.toml.
# Fill in real values. Do NOT commit real tokens (NN8) — .cc-agent-messenger/ is
# gitignored. Any key can also be overridden by an uppercase env var
# (e.g. SLACK_BOT_TOKEN). The config path env var is CC_AGENT_MESSENGER_CONFIG.

# --- Slack credentials (daemon-only; never leave the daemon) ---
slack_bot_token = "xoxb-REPLACE-ME"          # Bot User OAuth token
slack_app_token = "xapp-REPLACE-ME"          # App-level token, scope connections:write

# --- Identity / channel allowlist (NN4) ---
owner_slack_user_id = "U0REPLACEME"          # only this user may drive the agent
allowed_slack_channel_id = "C0REPLACEME"     # the designated private channel

# --- Local paths (host-specific; keep short — AF_UNIX path length limit) ---
profile_path = ".cc-agent-messenger/profile.json"
audit_log_dir = ".cc-agent-messenger/audit"
kill_switch_path = ".cc-agent-messenger/KILL_SWITCH"
send_api_endpoint = ".cc-agent-messenger/send.sock"
inbound_event_path = ".cc-agent-messenger/tmp/.slack_message"

# --- Behavior ---
default_agent = "claude"
interpretation_mode = "flexible"             # "flexible" | "strict"
max_chunk_chars = 3900
audit_retention_days = 30

# Instant "thinking…" ack (optional). On receiving a command, the daemon posts a
# placeholder that @-mentions you (so the phone push fires immediately), then edits
# it in place into the reply — one message goes "🤔 …" → the answer. Needs only
# chat:write. Off by default; uncomment to enable.
# thinking_ack = true
# thinking_text = "🤔 …"

# --- Scheduled monitors (optional; OPERATIONS.md §6) ---
# Fixed-interval reports. The daemon ticks every `every`; the live session gathers
# the content (the read-only `probe` and/or the natural-language `items` it
# interprets), reports concisely, and alerts if a rule trips. Toggle at runtime
# with `!watch <id> on|off` / `!watch <id> every:Nm`. Probes MUST be read-only;
# remote mutations stay NN5-gated. Keep SSH keys/aliases on this host, and add the
# probe to .claude/settings.json for hands-free reports.
#
# [[monitor]]
# id = "gpu"
# every = "5m"
# items = "GPU utilization, memory used, temperature, and the latest training loss"
# probe = "ssh gpu01 'nvidia-smi --query-gpu=utilization.gpu,memory.used,temperature.gpu --format=csv,noheader'"
# report = "concise"
# alert = ["temperature.gpu > 85", "loss is NaN or diverging", "training process not running"]
# enabled = true

# --- Multi-agent: headless C1 agents (optional) -----------------------------
# Route a *dedicated* Slack channel to a coding-agent CLI the daemon spawns once per
# message (prompt in -> reply out); the reply is posted back to that channel. Each
# Slack thread keeps its own resumable session. The default permission is read-only /
# plan-centric (NN5) — widen per agent via extra_args. The owner + the dedicated
# channel are the authorization; the kill switch and audit apply as usual.
#
# [[agent]]
# name = "claude-headless"
# integration = "c1"
# kind = "claude"            # adapter: json output + per-thread --resume (inferred from cli if omitted)
# channel_id = "C0SECONDCHANNEL"
# cli = "claude -p"
# # Allow workspace edits instead of the read-only default (use a private repo!):
# # extra_args = ["--permission-mode", "acceptEdits", "--allowedTools", "Read,Edit,Bash(git *)"]
#
# Headless GitHub Copilot on its own channel (install: npm i -g @github/copilot;
# authenticate via COPILOT_GITHUB_TOKEN / GH_TOKEN in the daemon's environment).
# Default is read-only (file writes are denied so a request is refused, not run).
# [[agent]]
# name = "copilot-headless"
# integration = "c1"
# kind = "copilot"
# channel_id = "C0THIRDCHANNEL"
# cli = "copilot"
# # extra_args = ["--allow-all-tools"]   # full autonomy incl. edits (use a private repo!)
#
# Headless Codex on its own channel (install: npm i -g @openai/codex; authenticate via
# `codex login`). `codex exec --json` creates a session; per-thread resume is `codex
# exec resume <thread_id>`. Default sandbox is read-only (set on the first turn; resume
# inherits it).
# [[agent]]
# name = "codex-headless"
# integration = "c1"
# kind = "codex"
# channel_id = "C0FOURTHCHANNEL"
# cli = "codex exec"
# # extra_args = ["-s", "workspace-write"]   # allow edits in the workspace (use a private repo!)
